name: pre-merge 

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "tooling/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/workflows/pre-merge.yml"
      - ".clang-format"
      - ".clang-tidy"

concurrency:
  group: pre-merge-checks
  cancel-in-progress: true

jobs:
  flake:
    uses: voidptrr/ctools/.github/workflows/checks.yml@02d4c66dbfdc952255a3a28298f5963d219234c8

  docs:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: DeterminateSystems/nix-installer-action@ef8a148080ab6020fd15196c2084a2eea5ff2d25 # v22

      - run: nix develop -c scripts/docs-build

name: Pre-Merge Checks

on:
  pull_request:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/**"
      - "tests/**"
      - "tooling/**"
      - "flake.nix"
      - "flake.lock"
      - ".github/scripts/**"
      - ".github/workflows/pre-merge.yml"
      - ".clang-format"

concurrency:
  group: pre-merge-checks
  cancel-in-progress: true

jobs:
  quality-gates:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha }}
      - uses: DeterminateSystems/nix-installer-action@v16

      - name: Enforce branch naming
        env:
          BRANCH_NAME: ${{ github.head_ref }}
        run: ./.github/scripts/validate-naming.sh --branch "$BRANCH_NAME"

      - name: Enforce commits naming and no merges
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: ./.github/scripts/validate-commits.sh

      - run: nix develop -c format-check
      - run: nix develop -c code-check
      - run: nix develop -c docs-build

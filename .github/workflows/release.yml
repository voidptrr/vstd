name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply from the previous tag
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark this GitHub Release as a prerelease
        required: true
        default: false
        type: boolean
      dry_run:
        description: Calculate the next tag without creating it
        required: true
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ inputs.bump }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        uses: mathieudutour/github-tag-action@d28fa2ccfbd16e871a4bdf35e11b3ad1bd56c0c1 # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump }}
          tag_prefix: ""
          release_branches: main
          create_annotated_tag: true
          fetch_all_tags: true
          dry_run: ${{ inputs.dry_run }}

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          previous_tag: ${{ steps.tag.outputs.previous_tag }}
          prerelease: ${{ inputs.prerelease }}

name: release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump to apply from the previous tag
        required: true
        default: patch
        type: choice
        options:
          - patch
          - minor
          - major
      prerelease:
        description: Mark this GitHub Release as a prerelease
        required: true
        default: false
        type: boolean
      dry_run:
        description: Calculate the next tag without creating it
        required: true
        default: false
        type: boolean
      create_release_branch:
        description: Create the MAJOR.MINOR.x release branch when missing
        required: true
        default: true
        type: boolean
      release_branches:
        description: Comma-separated branch patterns allowed to create release tags
        required: true
        default: 'main,[0-9]+\.[0-9]+\.x'
        type: string

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  release:
    name: Release ${{ inputs.bump }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0

      - name: Generate tag
        id: tag
        uses: mathieudutour/github-tag-action@d28fa2ccfbd16e871a4bdf35e11b3ad1bd56c0c1 # v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: ${{ inputs.bump }}
          tag_prefix: ""
          release_branches: ${{ inputs.release_branches }}
          create_annotated_tag: true
          fetch_all_tags: true
          dry_run: ${{ inputs.dry_run }}

      - name: Create release branch
        if: ${{ inputs.dry_run == false && inputs.create_release_branch == true }}
        env:
          NEW_VERSION: ${{ steps.tag.outputs.new_version }}
        run: |
          set -euo pipefail

          release_branch="$(printf '%s\n' "${NEW_VERSION}" | sed -nE 's/^([0-9]+)[.]([0-9]+)[.][0-9]+.*$/\1.\2.x/p')"

          if [ -z "${release_branch}" ]; then
            echo "Could not derive a release branch from version ${NEW_VERSION}."
            exit 1
          fi

          if git ls-remote --exit-code --heads origin "refs/heads/${release_branch}" >/dev/null 2>&1; then
            echo "Release branch ${release_branch} already exists."
            exit 0
          fi

          git push origin "HEAD:refs/heads/${release_branch}"

      - name: Create GitHub Release
        if: ${{ inputs.dry_run == false }}
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          name: ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.tag.outputs.changelog }}
          previous_tag: ${{ steps.tag.outputs.previous_tag }}
          prerelease: ${{ inputs.prerelease }}

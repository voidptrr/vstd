[project]
site_name = "k4c"
site_description = "Documentation for k4c"
site_author = "voidptrr"
copyright = """
Copyright &copy; 2026 voidptrr
"""
extra_css = ["stylesheets/extra.css"]
nav = [
  { "Overview" = "index.md" },
  { "Assert" = "reference/k4c-assert.md" },
  { "Error" = "reference/k4c-error.md" },
  { "Logging" = "reference/k4c-logging.md" },
  { "Testing" = "reference/k4c-testing.md" },
  { "Buffer" = [
    { "Cursor" = "buffer/cursor.md" },
  ] },
  { "IO" = [
    { "File" = "io/file.md" },
    { "File reader" = "io/file-reader.md" },
    { "Reader" = "io/reader.md" },
  ] },
  { "Allocators" = [
    { "Utilities" = "allocators/utils.md" },
    { "Allocators" = [
      { "Overview" = "allocators/overview.md" },
      { "Arena allocator" = "allocators/arena.md" },
      { "Free-list allocator" = "allocators/general-heap.md" },
      { "Test allocator" = "allocators/test-allocator.md" },
    ] },
  ] },
  { "Hash" = [
    { "Hashmap" = "hash/hashmap.md" },
    { "Hashset" = "hash/hashset.md" },
  ] },
  { "Data structures" = [
    { "Iterators" = "datastruct/iterator.md" },
    { "Binary heap" = "datastruct/binary-heap.md" },
    { "Vector" = "datastruct/vector.md" },
    { "Deque" = "datastruct/deque.md" },
    { "Linked list" = "datastruct/linked-list.md" },
    { "Doubly linked list" = "datastruct/doubly-linked-list.md" },
    { "String" = "datastruct/string.md" },
  ] },
]

[project.theme]
language = "en"
features = [
  "content.code.copy",
  "navigation.footer",
  "navigation.instant",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "search.suggest",
  "toc.follow",
  "toc.integrate",
]

[[project.theme.palette]]
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.theme.palette]]
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[project.markdown_extensions.admonition]
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.snippets]
[project.markdown_extensions.pymdownx.superfences]
[project.markdown_extensions.toc]
permalink = true
